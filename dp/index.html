    <script>
      $(document).ready(function() {
        function formatDate(date) {
          var monthNames = [
            "January",
            "February",
            "March",
            "April",
            "May",
            "June",
            "July",
            "August",
            "September",
            "October",
            "November",
            "December"
          ];

          var day = date.getDate();
          var monthIndex = date.getMonth();
          var year = date.getFullYear();

          return year + "-" + (monthIndex + 1) + "-" + day;
        }

        function setPreviousDate(val) {
          var date = new Date(val);

          date.setDate(date.getDate() - 1);
          date =
            date.getFullYear() +
            "-" +
            (date.getMonth() + 1) +
            "-" +
            date.getDate();

          $(".t-datepicker").tDatePicker({
            dateCheckIn: date,
            dateCheckOut: "2019-02-20"
          });
          $(".ccheckin").val(date);
        }
        function setNextDate(val) {
          var date = new Date(val);

          date.setDate(date.getDate() + 1);
          date =
            date.getFullYear() +
            "-" +
            (date.getMonth() + 1) +
            "-" +
            date.getDate();

          $(".t-datepicker").tDatePicker({
            dateCheckIn: date,
            dateCheckOut: "2019-02-20"
          });
          $(".ccheckin").val(date);
        }

        var holiDays = {
          "2019-01-01": "New Years is Day",
          "2019-01-02": "Lorem ipsum dolor sit amet ...",
          "2019-02-14": "Lorem ipsum dolor sit amet ...",
          "2019-01-02": "Lorem ipsum dolor sit amet ..."
        };
        // Call global the function
        $(".t-datepicker")
          .tDatePicker({
            fnDataEvent: holiDays,
            mergeDataEvent: true,
            numCalendar: 2,
            startOfWeek: 2,
            limitDateRanges: 180
          })
          .on("beforeShowDay", function() {
            console.log("beforeShowDay do something");
          })
          .on("clickDateCI", function(e, dateCI) {
            console.log("clickDateCI do something");
          })
          .on("selectedCI", function(e, slDateCI) {
            // console.log('selectedCI do something')
            // console.log(new Date(slDateCI));
            $(".ccheckin").val(formatDate(new Date(slDateCI)));
          })
          .on("selectedCO", function(e, slDateCI) {
            // console.log('selectedCI do something')
            // console.log(new Date(slDateCI));
            $(".ccheckout").val(formatDate(new Date(slDateCI)));
            $(".tabbing").hide();
          });
        $(".tab1").on("click", function() {
          $(".t-datepicker").tDatePicker("show");
        });
        // $(document).on("click", function(evt) {
        //   $(".tabbing").hide();
        // });
        $(document).on("click", ".ccheckin", function() {
          $(".t-datepicker").tDatePicker("show");
          $(".t-date-check-in").trigger("click");
          $(".tabbing").show();
          $(".t-day").attr("tabindex","0");
          Haptics.vibrate(200);
        });
        $(document).on("click", ".ccheckout", function() {
          $(".t-datepicker").show();
          $(".t-date-check-out").trigger("click");
          $(".tabbing").show();
          $(".t-day").attr("tabindex","0");
          Haptics.vibrate(200);
        });
        
        // binding enter on date

        $(document).on("keydown", ".t-datepicker-day", function(e) {
          switch (e.keyCode) {

            case 13:  $(e.target).trigger('click');
                      console.log(e.target);
                      break;

            case 38:  console.log("up");
                      break;
            
            case 37:  console.log("left");
                      let leftSibling = e.target.previousSibling;

                      if (leftSibling != null) {
                        leftSibling.focus();
                      }
                      else {
                        let currentElement = e.target;
                        let prevRow = $(currentElement).closest('tr').prev();
                        $(prevRow).find(".t-day").focus();
                      }
                      break;

            case 39:  console.log("right");
                      let rightSibling = e.target.nextSibling;
                      
                      if (rightSibling != null && $(rightSibling).hasClass("t-day")) {
                        rightSibling.focus();
                      }
                      else {
                        let currentElement = e.target;
                        let nextRow = $(currentElement).closest('tr').next();
                        if($(currentElement).closest('tr').next().length == 1) {
                          $(nextRow).find(".t-day")[0].focus();
                        }
                        else {
                          console.log($(currentElement).closest('tr').next().length);
                          //$(currentElement).closest('t-table-wrap').next().find(".t-day")[0].focus();
                        }
                      }
                      break;
                   
            case 40:  console.log("down");
                      break;
          }
        });

        $(".tab span").on("click", function() {
          var c = $(this).data("container");
          $(".tab span").removeClass("selected");
          $(this).addClass("selected");
          $(".tab-container").hide();
          $("." + c).show();
        });

        $(".prev-checkin").on("click", function() {
          setPreviousDate($(".ccheckin").val());
        });
        $(".next-checkin").on("click", function() {
          setNextDate($(".ccheckin").val());
        });
      });
    </script>
